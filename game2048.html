<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px 20px;
            background: #f6f8ff;
        }
        .box {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin: 0 0 5px 0;
            color: #1f2937;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px 16px 5px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .score-box {
            background: #f0f4ff;
            padding: 6px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #b9c4f0;
            padding: 10px;
            border-radius: 12px;
            margin: 0 auto;
            max-width: 420px;
        }
        .cell {
            aspect-ratio: 1;
            background: #d1d9f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: 0.1s;
            color: #1f2937;
        }
        .btn-group {
            margin: 16px 0 8px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            background: #6366f1;
            color: white;
        }
        .btn:hover {
            transform: scale(1.03);
            background: #4f46e5;
        }
        .btn-back {
            background: #10b981;
        }
        .btn-back:hover {
            background: #059669;
        }
        .status {
            font-size: 18px;
            margin: 12px 0 0 0;
            padding: 10px;
            border-radius: 10px;
            background: #f0f4ff;
            min-height: 44px;
        }
        .hint {
            color: #6b7280;
            font-size: 14px;
            margin-top: 8px;
        }
        @media (max-width: 450px) {
            .cell {
                font-size: 24px;
            }
            .grid {
                gap: 6px;
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>2048</h1>
        <div class="header">
            <div class="score-box">?? <span id="score">0</span></div>
            <button class="btn" id="resetBtn">?? 重新开始</button>
        </div>
        <div class="grid" id="grid"></div>
        <div class="status" id="status">使用键盘方向键或滑动操作</div>
        <div class="hint">← ↑ → ↓ 或 滑动屏幕</div>
        <div class="btn-group">
            <button class="btn btn-back" onclick="location.href='index.html'">?? 返回首页</button>
        </div>
    </div>

    <script>
        const SIZE = 4;
        let grid = [];
        let score = 0;
        let gameOver = false;
        let isMoving = false;

        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const statusEl = document.getElementById('status');

        function initGrid() {
            grid = [];
            for (let r = 0; r < SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    grid[r][c] = 0;
                }
            }
            score = 0;
            gameOver = false;
            isMoving = false;
            scoreEl.textContent = '0';
            statusEl.textContent = '使用键盘方向键或滑动操作';
            statusEl.style.background = '#f0f4ff';
            spawnTile();
            spawnTile();
            render();
        }

        function spawnTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) empty.push({ r, c });
                }
            }
            if (empty.length === 0) return false;
            const pos = empty[Math.floor(Math.random() * empty.length)];
            grid[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
            return true;
        }

        function render() {
            gridEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = grid[r][c];
                    if (val > 0) {
                        cell.textContent = val;
                        const colors = {
                            2: '#e5e7eb',
                            4: '#d1d5db',
                            8: '#fca5a5',
                            16: '#fb923c',
                            32: '#f97316',
                            64: '#ef4444',
                            128: '#facc15',
                            256: '#a3e635',
                            512: '#4ade80',
                            1024: '#34d399',
                            2048: '#22d3ee',
                            4096: '#818cf8'
                        };
                        cell.style.background = colors[val] || '#c7d2fe';
                        cell.style.color = val > 4 ? 'white' : '#1f2937';
                    } else {
                        cell.style.background = '#d1d9f5';
                        cell.textContent = '';
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        function slide(row) {
            // 移除零并合并
            let filtered = row.filter(v => v !== 0);
            let merged = [];
            let scoreGain = 0;
            for (let i = 0; i < filtered.length; i++) {
                if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
                    merged.push(filtered[i] * 2);
                    scoreGain += filtered[i] * 2;
                    i++;
                } else {
                    merged.push(filtered[i]);
                }
            }
            while (merged.length < SIZE) merged.push(0);
            return { row: merged, scoreGain };
        }

        function moveLeft() {
            let moved = false;
            let totalScore = 0;
            for (let r = 0; r < SIZE; r++) {
                const result = slide(grid[r]);
                if (result.row.join(',') !== grid[r].join(',')) moved = true;
                grid[r] = result.row;
                totalScore += result.scoreGain;
            }
            return { moved, scoreGain: totalScore };
        }

        function moveRight() {
            let moved = false;
            let totalScore = 0;
            for (let r = 0; r < SIZE; r++) {
                const reversed = [...grid[r]].reverse();
                const result = slide(reversed);
                const newRow = result.row.reverse();
                if (newRow.join(',') !== grid[r].join(',')) moved = true;
                grid[r] = newRow;
                totalScore += result.scoreGain;
            }
            return { moved, scoreGain: totalScore };
        }

        function moveUp() {
            let moved = false;
            let totalScore = 0;
            for (let c = 0; c < SIZE; c++) {
                const col = [];
                for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
                const result = slide(col);
                for (let r = 0; r < SIZE; r++) {
                    if (grid[r][c] !== result.row[r]) moved = true;
                    grid[r][c] = result.row[r];
                }
                totalScore += result.scoreGain;
            }
            return { moved, scoreGain: totalScore };
        }

        function moveDown() {
            let moved = false;
            let totalScore = 0;
            for (let c = 0; c < SIZE; c++) {
                const col = [];
                for (let r = SIZE - 1; r >= 0; r--) col.push(grid[r][c]);
                const result = slide(col);
                for (let r = 0; r < SIZE; r++) {
                    const val = result.row[SIZE - 1 - r];
                    if (grid[r][c] !== val) moved = true;
                    grid[r][c] = val;
                }
                totalScore += result.scoreGain;
            }
            return { moved, scoreGain: totalScore };
        }

        function checkGameOver() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return false;
                    if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }

        function performMove(moveFn) {
            if (gameOver || isMoving) return;
            isMoving = true;
            const result = moveFn();
            if (result.moved) {
                score += result.scoreGain;
                scoreEl.textContent = score;
                spawnTile();
                render();
                if (checkGameOver()) {
                    gameOver = true;
                    statusEl.textContent = '?? 游戏结束！得分：' + score;
                    statusEl.style.background = '#fee2e2';
                } else {
                    statusEl.textContent = '继续游戏...';
                    statusEl.style.background = '#dbeafe';
                }
            }
            isMoving = false;
        }

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            const keyMap = {
                'ArrowLeft': moveLeft,
                'ArrowRight': moveRight,
                'ArrowUp': moveUp,
                'ArrowDown': moveDown
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                performMove(keyMap[e.key]);
            }
        });

        // 触摸滑动控制
        let touchStartX = 0,
            touchStartY = 0;
        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        document.addEventListener('touchend', function(e) {
            const dx = e.changedTouches[0].screenX - touchStartX;
            const dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                performMove(dx > 0 ? moveRight : moveLeft);
            } else {
                performMove(dy > 0 ? moveDown : moveUp);
            }
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            initGrid();
        });

        // 启动
        initGrid();
    </script>
</body>
</html>
