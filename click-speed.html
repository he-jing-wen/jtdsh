<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>手速点击测试</title>
<style>
body {background:#f8f9fa;color:#222;text-align:center;padding:80px;}
#box {width:120px;height:120px;background:#38bdf8;margin:40px auto;border-radius:50%;line-height:120px;color:#000;font-weight:bold;font-size:18px;cursor:pointer;}
a {display:block;margin-top:40px;color:#0366d6;text-decoration:none;}
</style>
</head>
<body>
<h2>10秒内尽可能多次点击圆圈</h2>
<p>点击次数：<span id="count">0</span></p>
<div id="box" onclick="clickBox()">点击我开始计时</div>
<a href="index.html">← 返回网站首页</a>
<script>
let count = 0;
let timer = null;
let isStart = false;
function clickBox(){
    if(!isStart){
        isStart = true;
        timer = setTimeout(()=>{
            alert(`时间到！你一共点击${count}次`);
        },10000)
    }
    count++;
    document.getElementById('count').innerText = count;
}
</script>
</body>
</html>
